<div class="screen-header">
    <span class="material-symbols-outlined" id="btn-back" style="cursor: pointer; font-size: 32px; margin-bottom: 8px; user-select: none;">chevron_left</span>
    <div class="room-label" id="screen-room-label"></div>
    <div class="screen-title">Settings</div>
</div>

<div id="settings-interface" class="screen-body">

    <!-- Card profilo -->
    <div class="card">
        <div class="card-header-settings">
            <span id="iconProfile"></span>
            <span class="card-name">Profile</span>
        </div>
        <div class="card-info-container-settings">
            <span class="guest-name">Federico Andreatta</span>
            <!-- <span class="line"></span> -->
            <span class="guest-room">Room 405</span>
            <!-- <span class="line"></span> -->
            <span class="guest-days">12 April - 15 April</span>
        </div>
    </div>

    <!-- Card preferenze -->
    <div class="card" id="pref-card">
        <div class="card-header">
            <div style="display:flex;gap:20px;align-items:center">
                <div id="iconPreference"></div>
                <span class="card-name">Preferences</span>
            </div>
            <div id="toggle-container"></div>
        </div>
        <div class="learning-text-settings" style="padding-left: 76px; margin-bottom: 5px;">ARIS will learn your room
            preferences.</div>
    </div>

    <!-- card extra — appaiono quando toggle è on -->
    <div id="extra-cards"></div>

</div>
