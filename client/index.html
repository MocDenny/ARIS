<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARIS</title>
  <link rel="stylesheet" href="css/styles.css?v=1.1">
  <link rel="stylesheet" href="css/interactable_style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

  <!-- Import Map per risolvere i moduli bare di Material Design 3 -->
  <script type="importmap">
        {
            "imports": {
                "@material/web/": "https://esm.run/@material/web/"
            }
        }
    </script>
  <script type="module">
    import '@material/web/all.js';
  </script>
  <script type="module" src="js/render.js"></script>

<body>
  <div id="full-screen"></div>
  <!-- schermata corrente -->
  <div id="screen"></div>

  <!-- sidenav — sempre visibile tranne in eco/settings -->
  <aside class="side-nav" id="side-nav" style="display: flex; flex-direction: column;">
    <div class="nav-pill-1">
      <button class="nav-item" id="nav-lights"><span class="material-symbols-outlined">lightbulb</span></button>
      <button class="nav-item" id="nav-climate"><span class="material-symbols-outlined">thermostat</span></button>
      <button class="nav-item" id="nav-blinds"><span class="material-symbols-outlined">roller_shades</span></button>
    </div>
    <div class="nav-pill-2">
      <button class="nav-item nav-circle" id="nav-eco"><span class="material-symbols-outlined">eco</span></button>
      <button class="nav-item nav-circle" id="nav-settings"><span
          class="material-symbols-outlined">settings</span></button>
    </div>
  </aside>

  <!-- roombar — sempre visibile tranne in eco/settings -->
  <nav class="room-bar" id="room-bar">
    <button class="room-item" data-action="set-room" data-value="bedroom" id="nav-bedroom"><span
        class="material-symbols-outlined">bed</span></button>
    <button class="room-item" data-action="set-room" data-value="bathroom" id="nav-bathroom"><span
        class="material-symbols-outlined">bathtub</span></button>
    <button class="room-item" data-action="set-room" data-value="living_room" id="nav-living_room"><span
        class="material-symbols-outlined">weekend</span></button>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>

</html>
